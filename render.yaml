services:
  - type: web
    name: kallaa-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false # Set in Render dashboard
      - key: JWT_SECRET
        sync: false # Set in Render dashboard
      - key: RAZORPAY_KEY_ID
        sync: false # Will be added later
      - key: RAZORPAY_KEY_SECRET
        sync: false # Will be added later